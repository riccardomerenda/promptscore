name: Auto Merge Version Packages

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-version-packages-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'changeset-release/main'
    runs-on: ubuntu-latest

    steps:
      - name: Merge Version Packages PR and delete release branch
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const headRef = 'changeset-release/main';
            const headSha = context.payload.workflow_run.head_sha;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${headRef}`,
              base: 'main',
              per_page: 100,
            });

            const pr = pulls.find((item) => item.title === 'Version Packages' && item.head.sha === headSha);

            if (!pr) {
              core.info(`No open Version Packages PR found for ${headRef} at ${headSha}.`);
              return;
            }

            core.info(`Merging PR #${pr.number}: ${pr.title}`);

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              sha: headSha,
              merge_method: 'squash',
              commit_title: pr.title,
            });

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${headRef}`,
              });
              core.info(`Deleted branch ${headRef}.`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                core.info(`Branch ${headRef} was already deleted.`);
                return;
              }
              throw error;
            }
