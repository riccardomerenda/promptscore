name: Release

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      CI: true
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create release PR or publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release:publish
          commit: Version Packages
          title: Version Packages
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read product version
        if: steps.changesets.outputs.published == 'true'
        id: product-version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Create product release
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        env:
          PRODUCT_VERSION: ${{ steps.product-version.outputs.value }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = `v${process.env.PRODUCT_VERSION}`;
            const { owner, repo } = context.repo;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release ${tag} already exists.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: tag,
              generate_release_notes: true,
              make_latest: 'true',
            });
