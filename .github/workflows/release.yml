name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      CI: true
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create release PR or publish packages
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release:publish
          commit: Version Packages
          title: Version Packages
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout release PR branch
        if: steps.changesets.outputs.published != 'true' && steps.changesets.outputs.hasChangesets == 'true'
        uses: actions/checkout@v6
        with:
          ref: changeset-release/main
          fetch-depth: 0

      - name: Install release PR dependencies
        if: steps.changesets.outputs.published != 'true' && steps.changesets.outputs.hasChangesets == 'true'
        run: npm ci

      - name: Validate release PR branch
        if: steps.changesets.outputs.published != 'true' && steps.changesets.outputs.hasChangesets == 'true'
        run: |
          npm run build
          npm run lint
          npm run typecheck
          npm run check:docs-sync
          npm test
          npm run format:check

      - name: Merge Version Packages PR
        id: merge-version-packages
        if: steps.changesets.outputs.published != 'true' && steps.changesets.outputs.hasChangesets == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const headRef = 'changeset-release/main';

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${headRef}`,
              base: 'main',
              per_page: 100,
            });

            const pr = pulls.find((item) => item.title === 'Version Packages');

            if (!pr) {
              core.info(`No open Version Packages PR found for ${headRef}.`);
              core.setOutput('merged', 'false');
              return;
            }

            core.info(`Merging PR #${pr.number}: ${pr.title}`);

            const merge = await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              sha: pr.head.sha,
              merge_method: 'squash',
              commit_title: pr.title,
            });

            core.setOutput('merge_sha', merge.data.sha);
            core.setOutput('merged', 'true');

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${headRef}`,
              });
              core.info(`Deleted branch ${headRef}.`);
            } catch (error) {
              if (error.status === 404 || error.status === 422) {
                core.info(`Branch ${headRef} was already deleted.`);
                return;
              }
              throw error;
            }

      - name: Checkout merged Version Packages
        if: steps.merge-version-packages.outputs.merged == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.merge-version-packages.outputs.merge_sha }}
          fetch-depth: 0

      - name: Install merged Version Packages dependencies
        if: steps.merge-version-packages.outputs.merged == 'true'
        run: npm ci

      - name: Publish merged Version Packages
        id: auto-publish
        if: steps.merge-version-packages.outputs.merged == 'true'
        run: npm run release:publish

      - name: Read product version
        if: steps.changesets.outputs.published == 'true' || steps.auto-publish.outcome == 'success'
        id: product-version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Create product release
        if: steps.changesets.outputs.published == 'true' || steps.auto-publish.outcome == 'success'
        uses: actions/github-script@v8
        env:
          PRODUCT_VERSION: ${{ steps.product-version.outputs.value }}
          TARGET_COMMITISH: ${{ steps.merge-version-packages.outputs.merge_sha || github.sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = `v${process.env.PRODUCT_VERSION}`;
            const { owner, repo } = context.repo;
            const targetCommitish = process.env.TARGET_COMMITISH;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release ${tag} already exists.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: targetCommitish,
              name: tag,
              generate_release_notes: true,
              make_latest: 'true',
            });
